<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — AN</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ===== Tokens ===== */
:root {
  --navy-deep: #080E1A;
  --navy-dark: #0D1829;
  --navy-mid: #152238;
  --navy-light: #1E3050;
  --gold: #C9A96E;
  --gold-light: #DFC291;
  --text: #E8E4DD;
  --text-muted: #8A8B8E;
  --white: #F5F3EF;
  --border-opacity: 0.12;
  --border: rgba(201, 169, 110, var(--border-opacity));
  --ease-pulse: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-breath: cubic-bezier(0.4, 0, 0.6, 1);
}

/* ===== @property: border-opacity アニメーション ===== */
@property --border-opacity {
  syntax: '<number>';
  initial-value: 0.12;
  inherits: true;
}

/* ===== Reset ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans JP', 'Inter', system-ui, sans-serif;
  background: var(--navy-deep);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  animation: breath-bg 8s ease-in-out infinite;
}
:root {
  animation: breath-border 6s ease-in-out infinite;
}
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }

/* ===== Breath Keyframes ===== */
@keyframes breath-bg {
  0%, 100% { background-color: #080E1A; }
  50%       { background-color: #0A1020; }
}
@keyframes breath-border {
  0%, 100% { --border-opacity: 0.08; }
  50%       { --border-opacity: 0.16; }
}

/* ===== Hero title breath ===== */
@keyframes hero-breath {
  0%, 100% { opacity: 0.95; }
  50%       { opacity: 1.0; }
}

/* ===== Scroll reveal ===== */
[data-reveal-item] {
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 800ms ease-out, transform 800ms ease-out;
}
[data-reveal-item].revealed {
  opacity: 1;
  transform: translateY(0);
}

/* ===== Ripple ===== */
.ripple-host { position: relative; overflow: hidden; }
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(201, 169, 110, 0.35);
  transform: scale(0);
  animation: ripple-out 500ms ease-out forwards;
  pointer-events: none;
}
@keyframes ripple-out {
  to { transform: scale(4); opacity: 0; }
}

/* ===== Nav ===== */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 28px 56px;
  background: var(--navy-deep);
  border-bottom: 1px solid transparent;
  transition: border-color 0.3s;
}
nav.scrolled { border-bottom-color: var(--border); }
.nav-logo {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.18em;
  color: var(--white);
}
.nav-links {
  display: flex; gap: 40px; list-style: none;
}
.nav-links a {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.14em;
  color: var(--text-muted);
  display: inline-block;
  transition: color 0.2s, transform 0.24s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.nav-links a:hover { color: var(--gold); transform: scale(1.08); }
.nav-links a.active { color: var(--gold); }

/* ===== Layout ===== */
.inner {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 48px;
}

/* ===== Hero ===== */
.hero {
  padding-top: 200px;
  padding-bottom: 20px;
}
.hero .inner { position: relative; }
.hero-axis {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.3em;
  color: var(--gold);
  margin-bottom: 32px;
  display: block;
  animation: hero-breath 6s ease-in-out infinite;
}
.hero-name {
  font-family: 'Inter', sans-serif;
  font-size: clamp(26px, 3.5vw, 40px);
  font-weight: 300;
  line-height: 1.05;
  letter-spacing: -0.02em;
  color: var(--white);
  animation: hero-breath 6s ease-in-out infinite;
  display: inline-block;
  transform-origin: left center;
}
@keyframes hero-name-scale {
  0%, 100% { transform: scale(1); opacity: 0.95; }
  50%       { transform: scale(1.01); opacity: 1.0; }
}

/* ===== Client Cards Section ===== */
.works-section {
  padding-top: 0;
  padding-bottom: 160px;
}
.client-logos {
  display: flex;
  gap: 80px;
  align-items: center;
  justify-content: center;
  margin-top: 0;
}
.client-logo-link {
  display: block;
  transition: opacity 0.3s ease-out, transform 0.3s ease-out;
}
.client-logo-link:hover { opacity: 0.7; transform: scale(1.03); }
.client-logo-link img {
  height: 180px;
  width: auto;
  display: block;
}
.client-logo-yf img {
  height: 140px;
}
.client-logo-yf-text img {
  height: 70px;
}
.client-text-link {
  display: block;
  text-align: center;
  margin-top: 80px;
  padding: 64px 0;
  position: relative;
  overflow: hidden;
}
.client-text-link::before {
  content: '';
  position: absolute;
  inset: -50%;
  background-image:
    linear-gradient(0deg, rgba(223,194,145,0.14) 1px, transparent 1px),
    linear-gradient(90deg, rgba(223,194,145,0.14) 1px, transparent 1px),
    linear-gradient(60deg, rgba(223,194,145,0.2) 1px, transparent 1px),
    linear-gradient(120deg, rgba(223,194,145,0.2) 1px, transparent 1px);
  background-size: 32px 32px, 32px 32px, 48px 48px, 48px 48px;
  animation: gridRotate 60s linear infinite;
}
.client-text-link::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle 300px at 30% 50%, rgba(223,194,145,0.1) 0%, transparent 70%),
    radial-gradient(circle 200px at 70% 50%, rgba(223,194,145,0.07) 0%, transparent 70%);
  animation: pulseGlow 8s ease-in-out infinite alternate;
}
@keyframes gridRotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes pulseGlow {
  0% { opacity: 0.5; }
  100% { opacity: 1; }
}
.client-text-link a {
  position: relative;
  z-index: 1;
  font-family: 'Inter', sans-serif;
  font-size: 28px;
  font-weight: 400;
  letter-spacing: 0.14em;
  color: var(--text-muted);
  display: inline-block;
  opacity: 0.7;
  transition: color 0.2s, opacity 0.3s ease-out, transform 0.3s var(--ease-pulse);
}
.client-text-link a:hover {
  color: var(--gold);
  opacity: 1.0;
  transform: scale(1.05) translateX(4px);
}

/* ===== Footer ===== */
footer {
  padding: 40px 0;
  border-top: 1px solid var(--border);
}
footer .inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.footer-copy {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.1em;
  color: var(--text-muted);
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  nav { padding: 20px 24px; }
  .inner { padding: 0 24px; }
  .hero { padding-top: 140px; padding-bottom: 0; }
  .works-section { padding-top: 0; padding-bottom: 100px; }
  .client-logos { flex-direction: column; gap: 48px; margin-top: 24px; }
  .client-logo-link img { height: 120px; }
  .client-logo-yf img { height: 100px; }
  .client-logo-yf-text img { height: 50px; }
  .client-text-link { margin-top: 56px; }
}

/* ===== prefers-reduced-motion ===== */
@media (prefers-reduced-motion: reduce) {
  body { animation: none !important; background-color: #080E1A !important; }
  :root { animation: none !important; --border-opacity: 0.12 !important; }
  .hero-name, .hero-axis { animation: none !important; opacity: 1 !important; }
  [data-reveal-item] { opacity: 1 !important; transform: none !important; transition: none !important; }
  .nav-links a { transition: color 0.2s !important; transform: none !important; }
  .client-logo-link, .client-text-link a { transition: opacity 0.2s, color 0.2s !important; transform: none !important; }
}
</style>
</head>
<body>

<nav id="mainNav">
  <a href="index.html" class="nav-logo ripple-host">AN</a>
  <ul class="nav-links">
    <li><a href="index.html" class="active ripple-host">works</a></li>
    <li><a href="message.html" class="ripple-host">message</a></li>
    <li><a href="contact.html" class="ripple-host">contact</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="inner">
    <span class="hero-axis">design &times; ai</span>
    <h1 class="hero-name"><a href="about.html" class="ripple-host" style="color: inherit; display: inline-block; transition: color 0.2s;" onmouseover="this.style.color='#C9A96E'" onmouseout="this.style.color='inherit'">Ayumu</a></h1>
  </div>
</section>

<section class="works-section">
  <div class="inner">
    <div class="client-logos">
      <a href="works/youthfull.html" class="client-logo-link client-logo-yf">
        <img src="images/logo-youthfull.png" alt="Youthfull">
      </a>
      <a href="works/youthfull.html" class="client-logo-link client-logo-yf-text">
        <img src="images/logo-youthfull-text.png" alt="Youthfull">
      </a>
      <a href="works/kickswrap.html" class="client-logo-link">
        <img src="images/logo-kickswrap.png" alt="KicksWrap">
      </a>
    </div>
    <div class="client-text-link">
      <a href="works/sa.html">AI Automation</a>
    </div>
  </div>
</section>

<footer>
  <div class="inner">
    <span class="footer-copy">&copy; 2026 AN</span>
  </div>
</footer>

<script>
/* ===== Nav scroll ===== */
const nav = document.getElementById('mainNav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 10);
}, { passive: true });

/* ===== Ripple ===== */
function createRipple(e) {
  const el = e.currentTarget;
  const rect = el.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 2;
  const x = e.clientX - rect.left - size / 2;
  const y = e.clientY - rect.top - size / 2;
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;`;
  el.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
}
document.querySelectorAll('.ripple-host').forEach(el => {
  el.addEventListener('click', createRipple);
});

/* ===== Scroll reveal ===== */
const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (prefersReduced) {
  document.querySelectorAll('[data-reveal-item]').forEach(el => el.classList.add('revealed'));
} else {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const section = entry.target;
      const items = section.querySelectorAll('[data-reveal-item]');
      setTimeout(() => {
        items.forEach((item, i) => {
          setTimeout(() => item.classList.add('revealed'), i * 120);
        });
      }, 400);
      observer.unobserve(section);
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('[data-reveal]').forEach(s => observer.observe(s));
}
</script>
</body>
</html>
