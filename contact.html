<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — AN</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ===== Tokens ===== */
:root {
  --navy-deep: #080E1A;
  --navy-dark: #0D1829;
  --navy-mid: #152238;
  --navy-light: #1E3050;
  --gold: #C9A96E;
  --gold-light: #DFC291;
  --text: #E8E4DD;
  --text-muted: #8A8B8E;
  --white: #F5F3EF;
  --border-opacity: 0.12;
  --border: rgba(201, 169, 110, var(--border-opacity));
  --ease-pulse: cubic-bezier(0.34, 1.56, 0.64, 1);
}
@property --border-opacity {
  syntax: '<number>';
  initial-value: 0.12;
  inherits: true;
}

/* ===== Reset ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans JP', 'Inter', system-ui, sans-serif;
  background: var(--navy-deep);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  animation: breath-bg 8s ease-in-out infinite;
}
:root { animation: breath-border 6s ease-in-out infinite; }
a { color: inherit; text-decoration: none; }

/* ===== Breath Keyframes ===== */
@keyframes breath-bg {
  0%, 100% { background-color: #080E1A; }
  50%       { background-color: #0A1020; }
}
@keyframes breath-border {
  0%, 100% { --border-opacity: 0.08; }
  50%       { --border-opacity: 0.16; }
}

/* ===== Ripple ===== */
.ripple-host { position: relative; overflow: hidden; }
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(201, 169, 110, 0.35);
  transform: scale(0);
  animation: ripple-out 500ms ease-out forwards;
  pointer-events: none;
}
@keyframes ripple-out {
  to { transform: scale(4); opacity: 0; }
}

/* ===== Nav ===== */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 28px 56px;
  background: var(--navy-deep);
  border-bottom: 1px solid transparent;
  transition: border-color 0.3s;
}
nav.scrolled { border-bottom-color: var(--border); }
.nav-logo {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.18em;
  color: var(--white);
}
.nav-links {
  display: flex; gap: 40px; list-style: none;
}
.nav-links a {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.14em;
  color: var(--text-muted);
  display: inline-block;
  transition: color 0.2s, transform 0.24s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.nav-links a:hover { color: var(--gold); transform: scale(1.08); }
.nav-links a.active { color: var(--gold); }

/* ===== Layout ===== */
.inner {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 48px;
}

/* ===== Page ===== */
.page {
  padding-top: 200px;
  padding-bottom: 160px;
  min-height: 100vh;
}
.page-label {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.3em;
  color: var(--gold);
  display: block;
  margin-bottom: 72px;
}
.contact-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.contact-item {
  display: flex;
  align-items: baseline;
  gap: 48px;
  padding: 24px 0;
  border-top: 1px solid var(--border);
}
.contact-item:last-child { border-bottom: 1px solid var(--border); }
.contact-key {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.14em;
  color: var(--text-muted);
  min-width: 80px;
}
.contact-val {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 300;
  color: var(--white);
  display: inline-block;
  transition: color 0.2s, transform 0.24s cubic-bezier(0.34, 1.56, 0.64, 1);
}
a.contact-val:hover {
  color: var(--gold);
  transform: scale(1.04) translateX(4px);
}

/* ===== Footer ===== */
footer {
  padding: 40px 0;
  border-top: 1px solid var(--border);
}
footer .inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.footer-copy {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.1em;
  color: var(--text-muted);
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  nav { padding: 20px 24px; }
  .inner { padding: 0 24px; }
  .page { padding-top: 140px; padding-bottom: 100px; }
  .page-label { margin-bottom: 48px; }
  .contact-item { gap: 24px; flex-direction: column; }
  .contact-key { min-width: unset; }
}

/* ===== prefers-reduced-motion ===== */
@media (prefers-reduced-motion: reduce) {
  body { animation: none !important; background-color: #080E1A !important; }
  :root { animation: none !important; --border-opacity: 0.12 !important; }
  .nav-links a { transition: color 0.2s !important; transform: none !important; }
  a.contact-val { transition: color 0.2s !important; transform: none !important; }
}
</style>
</head>
<body>

<nav id="mainNav">
  <a href="index.html" class="nav-logo ripple-host">AN</a>
  <ul class="nav-links">
    <li><a href="index.html" class="ripple-host">works</a></li>
    <li><a href="message.html" class="ripple-host">message</a></li>
    <li><a href="contact.html" class="active ripple-host">contact</a></li>
  </ul>
</nav>

<main class="page">
  <div class="inner">
    <span class="page-label">contact</span>
    <ul class="contact-list">
      <li class="contact-item">
        <span class="contact-key">Email</span>
        <a href="mailto:tea.815.room@gmail.com" class="contact-val ripple-host">tea.815.room@gmail.com</a>
      </li>
    </ul>
  </div>
</main>

<footer>
  <div class="inner">
    <span class="footer-copy">&copy; 2026 AN</span>
  </div>
</footer>

<script>
/* ===== Nav scroll ===== */
const nav = document.getElementById('mainNav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 10);
}, { passive: true });

/* ===== Ripple ===== */
function createRipple(e) {
  const el = e.currentTarget;
  const rect = el.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 2;
  const x = e.clientX - rect.left - size / 2;
  const y = e.clientY - rect.top - size / 2;
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;`;
  el.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
}
document.querySelectorAll('.ripple-host').forEach(el => {
  el.addEventListener('click', createRipple);
});
</script>
</body>
</html>
