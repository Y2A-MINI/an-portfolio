<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="system-ui, -apple-system, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="500" fill="#080E1A"/>

  <!-- 中央の区切り線（縦） -->
  <line x1="400" y1="60" x2="400" y2="440" stroke="rgba(201,169,110,0.12)" stroke-width="1"/>

  <!-- ラベル行 -->
  <text x="180" y="52" text-anchor="middle" fill="#8A8B8E" font-size="11" font-weight="600" letter-spacing="0.12em">BEFORE</text>
  <text x="620" y="52" text-anchor="middle" fill="#C9A96E" font-size="11" font-weight="600" letter-spacing="0.12em">AFTER</text>

  <!-- タイトル行水平線 -->
  <line x1="48" y1="60" x2="340" y2="60" stroke="rgba(139,69,19,0.4)" stroke-width="1"/>
  <line x1="460" y1="60" x2="752" y2="60" stroke="rgba(201,169,110,0.4)" stroke-width="1"/>

  <!-- 中央矢印 -->
  <line x1="370" y1="250" x2="430" y2="250" stroke="#C9A96E" stroke-width="1.5"/>
  <polyline points="422,244 430,250 422,256" fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- ============ BEFORE側 ============ -->
  <text x="80" y="108" fill="rgba(139,69,19,0.9)" font-size="13" font-weight="600" letter-spacing="0.05em">売上分析</text>
  <line x1="80" y1="114" x2="170" y2="114" stroke="rgba(139,69,19,0.35)" stroke-width="1"/>

  <rect x="64" y="138" width="8" height="8" rx="1" fill="rgba(139,69,19,0.7)"/>
  <text x="84" y="148" fill="#E8E4DD" font-size="14.5">売上低下の原因が見えない</text>

  <rect x="64" y="186" width="8" height="8" rx="1" fill="rgba(139,69,19,0.7)"/>
  <text x="84" y="196" fill="#E8E4DD" font-size="14.5">スプレッドシートで手集計</text>

  <rect x="64" y="234" width="8" height="8" rx="1" fill="rgba(139,69,19,0.7)"/>
  <text x="84" y="244" fill="#E8E4DD" font-size="14.5">属人的な分析</text>

  <!-- スプレッドシートのイメージ（整理されていない表） -->
  <g opacity="0.45">
    <!-- グリッド（不揃い感を出す） -->
    <rect x="68" y="292" width="288" height="120" rx="2" fill="none" stroke="rgba(139,69,19,0.3)" stroke-width="1"/>

    <!-- 列ヘッダー -->
    <line x1="68" y1="308" x2="356" y2="308" stroke="rgba(139,69,19,0.3)" stroke-width="1"/>
    <line x1="140" y1="292" x2="140" y2="412" stroke="rgba(139,69,19,0.2)" stroke-width="1"/>
    <line x1="220" y1="292" x2="220" y2="412" stroke="rgba(139,69,19,0.2)" stroke-width="1"/>
    <line x1="288" y1="292" x2="288" y2="412" stroke="rgba(139,69,19,0.2)" stroke-width="1"/>
    <line x1="68" y1="340" x2="356" y2="340" stroke="rgba(139,69,19,0.15)" stroke-width="1"/>
    <line x1="68" y1="372" x2="356" y2="372" stroke="rgba(139,69,19,0.15)" stroke-width="1"/>

    <!-- セルテキスト（ぼんやり） -->
    <text x="96" y="304" fill="#8A8B8E" font-size="9">日付</text>
    <text x="168" y="304" fill="#8A8B8E" font-size="9">売上</text>
    <text x="244" y="304" fill="#8A8B8E" font-size="9">前月比</text>
    <text x="312" y="304" fill="#8A8B8E" font-size="9">原因</text>

    <text x="96" y="329" fill="#8A8B8E" font-size="9">3/1</text>
    <text x="158" y="329" fill="#8A8B8E" font-size="9">¥438,000</text>
    <text x="248" y="329" fill="rgba(139,69,19,0.7)" font-size="9">−12%</text>
    <text x="300" y="329" fill="#8A8B8E" font-size="9">?</text>

    <text x="96" y="361" fill="#8A8B8E" font-size="9">3/8</text>
    <text x="158" y="361" fill="#8A8B8E" font-size="9">¥392,000</text>
    <text x="248" y="361" fill="rgba(139,69,19,0.7)" font-size="9">−18%</text>
    <text x="300" y="361" fill="#8A8B8E" font-size="9">?</text>

    <text x="96" y="393" fill="#8A8B8E" font-size="9">3/15</text>
    <text x="158" y="393" fill="#8A8B8E" font-size="9">¥501,000</text>
    <text x="248" y="393" fill="#8A8B8E" font-size="9">+3%</text>
    <text x="300" y="393" fill="#8A8B8E" font-size="9">—</text>
  </g>

  <text x="176" y="428" text-anchor="middle" fill="rgba(139,69,19,0.6)" font-size="11" letter-spacing="0.06em">手動集計・原因不明・意思決定が遅い</text>

  <!-- ============ AFTER側 ============ -->
  <text x="436" y="108" fill="#C9A96E" font-size="13" font-weight="600" letter-spacing="0.05em">売上分析ダッシュボード</text>
  <line x1="436" y1="114" x2="680" y2="114" stroke="rgba(201,169,110,0.35)" stroke-width="1"/>

  <line x1="436" y1="141" x2="446" y2="151" stroke="rgba(201,169,110,0.8)" stroke-width="1.5"/>
  <line x1="446" y1="141" x2="436" y2="151" stroke="rgba(201,169,110,0.8)" stroke-width="1.5"/>
  <text x="460" y="150" fill="#E8E4DD" font-size="14.5">41,000件を自動分析</text>

  <line x1="436" y1="189" x2="446" y2="199" stroke="rgba(201,169,110,0.8)" stroke-width="1.5"/>
  <line x1="446" y1="189" x2="436" y2="199" stroke="rgba(201,169,110,0.8)" stroke-width="1.5"/>
  <text x="460" y="198" fill="#E8E4DD" font-size="14.5">KPI / RFM / コホート / チャネル</text>

  <line x1="436" y1="237" x2="446" y2="247" stroke="rgba(201,169,110,0.8)" stroke-width="1.5"/>
  <line x1="446" y1="237" x2="436" y2="247" stroke="rgba(201,169,110,0.8)" stroke-width="1.5"/>
  <text x="460" y="246" fill="#E8E4DD" font-size="14.5">データで意思決定</text>

  <!-- ダッシュボードイメージ（整然） -->
  <g opacity="0.75">
    <!-- コンテナ -->
    <rect x="436" y="292" width="300" height="120" rx="3" fill="rgba(201,169,110,0.04)" stroke="rgba(201,169,110,0.2)" stroke-width="1"/>

    <!-- KPIカード 上段 -->
    <rect x="448" y="302" width="80" height="38" rx="2" fill="none" stroke="rgba(201,169,110,0.25)" stroke-width="1"/>
    <text x="488" y="318" text-anchor="middle" fill="#C9A96E" font-size="13" font-weight="600">¥4.1M</text>
    <text x="488" y="332" text-anchor="middle" fill="#8A8B8E" font-size="9">総売上</text>

    <rect x="542" y="302" width="80" height="38" rx="2" fill="none" stroke="rgba(201,169,110,0.25)" stroke-width="1"/>
    <text x="582" y="318" text-anchor="middle" fill="#C9A96E" font-size="13" font-weight="600">41,000</text>
    <text x="582" y="332" text-anchor="middle" fill="#8A8B8E" font-size="9">注文件数</text>

    <rect x="636" y="302" width="88" height="38" rx="2" fill="none" stroke="rgba(201,169,110,0.25)" stroke-width="1"/>
    <text x="680" y="318" text-anchor="middle" fill="#C9A96E" font-size="13" font-weight="600">RFM</text>
    <text x="680" y="332" text-anchor="middle" fill="#8A8B8E" font-size="9">顧客セグメント</text>

    <!-- グラフエリア（折れ線イメージ） -->
    <rect x="448" y="352" width="276" height="48" rx="2" fill="none" stroke="rgba(201,169,110,0.15)" stroke-width="1"/>

    <!-- 折れ線 -->
    <polyline
      points="458,384 480,370 504,378 528,362 552,368 576,356 600,364 624,352 648,360 672,348 696,354 716,344"
      fill="none"
      stroke="#C9A96E"
      stroke-width="1.5"
      stroke-linejoin="round"
      opacity="0.7"
    />
    <!-- データ点 -->
    <circle cx="576" cy="356" r="2.5" fill="#C9A96E" opacity="0.8"/>
    <circle cx="716" cy="344" r="2.5" fill="#C9A96E" opacity="0.8"/>

    <!-- ベースライン -->
    <line x1="448" y1="392" x2="724" y2="392" stroke="rgba(201,169,110,0.1)" stroke-width="1"/>
    <text x="458" y="401" fill="#8A8B8E" font-size="8">チャネル別売上推移</text>
  </g>

  <text x="570" y="428" text-anchor="middle" fill="rgba(201,169,110,0.6)" font-size="11" letter-spacing="0.06em">自動集計・原因可視化・即時意思決定</text>

  <!-- 下部区切り線 -->
  <line x1="48" y1="440" x2="752" y2="440" stroke="rgba(201,169,110,0.08)" stroke-width="1"/>
  <text x="400" y="472" text-anchor="middle" fill="#8A8B8E" font-size="11" letter-spacing="0.1em">CASE 02 — 売上分析ダッシュボード（41,000件自動分析）</text>
</svg>
